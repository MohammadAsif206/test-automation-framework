name: UI Test Suite — All Modules

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [dev, staging, prod]

env:
  BASE_URL: ${{ vars.BASE_URL || 'https://www.saucedemo.com' }}

jobs:

  # ── Java + Selenium ──────────────────────────────────────────────────────────
  java-selenium:
    name: Java + Selenium
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-selenium

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn clean test -DBASE_URL=${{ env.BASE_URL }} -DHEADLESS=true
        env:
          HEADLESS: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-java
          path: java-selenium/target/allure-results

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-java
          path: java-selenium/target/surefire-reports


  # ── TypeScript + Playwright ──────────────────────────────────────────────────
  typescript-playwright:
    name: TypeScript + Playwright
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript-playwright

    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: typescript-playwright/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          BASE_URL: ${{ env.BASE_URL }}
          HEADLESS: 'true'
          CI: 'true'

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ts-${{ matrix.project }}
          path: typescript-playwright/allure-results

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: typescript-playwright/playwright-report


  # ── Python + Selenium/Playwright ─────────────────────────────────────────────
  python:
    name: Python (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-selenium

    strategy:
      fail-fast: false
      matrix:
        driver: [playwright, selenium]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: python-selenium/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        if: matrix.driver == 'playwright'
        run: playwright install --with-deps chromium

      - name: Run tests
        run: pytest -m smoke --alluredir=allure-results
        env:
          BASE_URL: ${{ env.BASE_URL }}
          DRIVER: ${{ matrix.driver }}
          HEADLESS: 'true'

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-python-${{ matrix.driver }}
          path: python-selenium/allure-results


  # ── Unified Allure Report ────────────────────────────────────────────────────
  allure-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [java-selenium, typescript-playwright, python]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1.7
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Publish to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
